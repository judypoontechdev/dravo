{% extends "layout.html" %}

{% block title %}
Register
{% endblock %}

{% block main %}
<div class="container mt-5">
    <form action="/register" method="post" class="mx-auto" style="max-width: 400px;">
        <h2 class="mb-4">Register</h2>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control" name="username" placeholder="Username" type="text">
        </div>
        <div class="mb-3">
            <input class="form-control" name="password" placeholder="Password" type="password">
        </div>
        <div class="mb-3">
            <input class="form-control" name="confirmation" placeholder="Confirmation" type="password">
        </div>
        <button class="btn btn-primary w-100" type="submit">Register</button>
        <p class="mt-3 text-muted">Already have an account? <a href="/login">Log in here</a></p>
    </form>
</div>
{% endblock %}
